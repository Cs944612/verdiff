name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Benchmark Smoke
        run: sh bench/run_benchmark.sh 2000
